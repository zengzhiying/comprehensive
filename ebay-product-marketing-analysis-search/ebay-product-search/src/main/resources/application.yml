server:
  port: 18081

spring:
  kafka:
    bootstrap-servers: 192.168.1.11:9092
    product-topic: ebayProductMessage
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        client:
          id: product-producer
    consumer:
      bootstrap-servers: 192.168.1.11:9092
      group-id: product-consumer-group
      auto-offset-reset: latest
      enable-auto-commit: false  # 手动提交偏移量
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  datasource:
    url: jdbc:mysql://192.168.1.11:3306/ebay?useSSL=false
    username: ebay
    password: ebay-123456
  elasticsearch:
    uris: 192.168.1.11:9200
    username: elastic
    password: es-123456
    product-index: product_index
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 500
        order_inserts: true
  data:
    redis:
      host: 192.168.1.11
      port: 6379
      username: redis
      password: redis-123456
      database: 0
      lettuce:
        pool:
          max-active: 8        # 连接池最大连接数（使用负值表示没有限制）
          max-idle: 8          # 连接池最大空闲连接
          min-idle: 0          # 连接池最小空闲连接
        shutdown-timeout: 100ms # 关闭连接时的超时时间
      timeout: 3000ms

# 自定义配置
batch-size: 500  # 批量处理阈值
redis-expire-seconds: 86400  # Redis 缓存过期时间（1天）
review-rank-key: product-review-top
brand-rank-key: product-brand-top